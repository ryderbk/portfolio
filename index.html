<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bk’s Portfolio</title>
    <meta name="description" content="Bharath Kumar S is a full-stack developer and electronics engineer based in Chennai, India. Building high-performance web applications, embedded systems, and creative digital solutions." />
    <meta name="theme-color" content="#09090B" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#FAFAFA" media="(prefers-color-scheme: light)" />

    <!-- OpenGraph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Bk’s Portfolio" />
    <meta property="og:description" content="Full-stack developer and electronics engineer building high-performance applications and embedded systems." />
    <meta property="og:image" content="/opengraph.jpg" />
    <meta property="og:url" content="https://bharathkumars.dev" />
    <meta property="og:site_name" content="Bharath Kumar S Portfolio" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Bk’s Portfolio" />
    <meta name="twitter:description" content="Full-stack developer and electronics engineer building high-performance applications and embedded systems." />
    <meta name="twitter:image" content="/opengraph.jpg" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <link rel="apple-touch-icon" href="/favicon.svg?v=2" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@600;700&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>
  </head>
  <body>
    <script>
      // Prevent FOUC: Instantly restore compiled theme and CSS variables before React mounts
      (function() {
        try {
          var cssText = localStorage.getItem('portfolio-css-text');
          var cssClasses = localStorage.getItem('portfolio-css-classes');
          var cardStyle = localStorage.getItem('portfolio-card-style');
          
          if (cssText) document.documentElement.style.cssText = cssText;
          if (cssClasses) document.documentElement.className = cssClasses;
          if (cardStyle) document.documentElement.setAttribute('data-card-style', cardStyle);
        } catch (e) {
          console.error("Failed to restore initial theme", e);
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
