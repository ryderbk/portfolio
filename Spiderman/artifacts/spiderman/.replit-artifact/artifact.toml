kind = "web"
previewPath = "/"
title = "Spider-Man Landing Page"
version = "1.0.0"
id = "artifacts/spiderman"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19736

[services.development]
run = "pnpm --filter @workspace/spiderman run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/spiderman", "run", "build" ]
publicDir = "artifacts/spiderman/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19736"
BASE_PATH = "/"
